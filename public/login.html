<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Iniciar sesión — Portal Gremial AFUSAMUT</title>
<link rel="icon" type="image/png" href="/img/logo.png"/>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,600;9..144,900&family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/css/styles.css"/>
<!-- PWA: portal instalable en el teléfono -->
<link rel="manifest" href="/manifest.json"/>
<meta name="theme-color" content="#0A3622"/>
<link rel="apple-touch-icon" href="/img/icon-180.png"/>
<script>
if ('serviceWorker' in navigator) {
  window.addEventListener('load', function () {
    navigator.serviceWorker.register('/sw.js').catch(function () {});
  });
}
</script>
</head>
<body>

<div class="login-wrap">
  <div class="login-card">
    <img src="/img/logo.png" alt="Logo AFUSAMUT"/>
    <div class="login-eyebrow">Bienvenido/a de vuelta</div>
    <h1>Portal Gremial AFUSAMUT</h1>
    <p class="login-sub">Acceso exclusivo para socios registrados</p>

    <div class="login-providers">
      <button class="btn-provider btn-google" id="btnGoogle">
        <svg viewBox="0 0 48 48" aria-hidden="true">
          <path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z"/>
          <path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"/>
          <path fill="#FBBC05" d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.97-6.19z"/>
          <path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.15 1.45-4.92 2.3-8.16 2.3-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"/>
        </svg>
        Continuar con Google
        <span class="provider-hint">@gmail</span>
      </button>

      <button class="btn-provider btn-microsoft" id="btnMicrosoft">
        <svg viewBox="0 0 24 24" aria-hidden="true">
          <rect x="1" y="1" width="10" height="10" fill="#F25022"/>
          <rect x="13" y="1" width="10" height="10" fill="#7FBA00"/>
          <rect x="1" y="13" width="10" height="10" fill="#00A4EF"/>
          <rect x="13" y="13" width="10" height="10" fill="#FFB900"/>
        </svg>
        Continuar con Microsoft
        <span class="provider-hint">@hotmail · @outlook</span>
      </button>
    </div>

    <div class="login-error" id="loginError" role="alert"></div>

    <p class="login-foot">¿No tienes acceso? Contacta al Directorio.</p>
  </div>
</div>

<script type="module">
  import './js/sentry.js';
  import { dlog } from './js/debug.js';
  import { auth, onAuthStateChanged } from './js/firebase.js';
  import { loginWithGoogle, loginWithMicrosoft, procesarRedirectLogin } from './js/auth.js';

  // [DEBUG] diagnóstico de configuración al cargar
  (function diagnosticoConfig() {
    dlog('info', '=== DIAGNÓSTICO DE CONFIGURACIÓN ===');
    dlog('info', `Dominio actual: ${location.hostname}`);
    dlog('info', `authDomain: ${auth.app.options.authDomain}`);
    dlog('info', `projectId: ${auth.app.options.projectId}`);
    dlog('rules', 'Si el redirect vuelve sin sesión → revisar Authorized domains en Firebase');
  })();

  // Transición suave entre páginas (login → portal)
  function navegarConFade(url) {
    document.body.style.transition = 'opacity .3s ease';
    document.body.style.opacity = '0';
    setTimeout(() => { window.location.href = url; }, 300);
  }

  const MENSAJES = {
    NO_REGISTRADO:   'Tu cuenta no está registrada en AFUSAMUT. Contacta al Directorio.',
    INACTIVO:        'Tu cuenta está desactivada. Contacta al Directorio.',
    DOMINIO_INVALIDO:'Tu cuenta no está autorizada para ese rol. Contacta al Directorio.',
    EMAIL_YA_EXISTE: 'Ya tienes una cuenta con este email usando otro método (Google o Microsoft). Usa el mismo botón con el que entraste la primera vez.',
    GENERICO:        'Error al iniciar sesión. Intenta nuevamente.',
  };

  const btnGoogle    = document.getElementById('btnGoogle');
  const btnMicrosoft = document.getElementById('btnMicrosoft');
  const botones      = [btnGoogle, btnMicrosoft];
  const errBox       = document.getElementById('loginError');

  function mostrarError(code) {
    errBox.textContent = MENSAJES[code] || MENSAJES.GENERICO;
    errBox.classList.add('visible');
  }
  function setBotones(deshabilitados) {
    botones.forEach(b => { b.disabled = deshabilitados; });
  }

  // 1. Al cargar: procesar el posible retorno del redirect (Google o Microsoft —
  //    el flujo posterior es idéntico: bootstrap, padronPendiente, validación).
  //    El observer de sesión se registra DESPUÉS, para no redirigir al portal
  //    a mitad del bootstrap/reclamo de ficha (abortaba el setDoc).
  (async function init() {
    dlog('auth', 'login.html: procesando posible retorno de redirect...'); // [DEBUG]
    setBotones(true);
    try {
      const res = await procesarRedirectLogin();
      if (res) {
        dlog('ok', 'login.html: login por redirect exitoso → portal'); // [DEBUG]
        navegarConFade('/portal.html');
        return;
      }
    } catch (e) {
      dlog('error', `login.html: redirect login falló: ${e.code}`, e.message); // [DEBUG]
      mostrarError(e.code);
    }
    setBotones(false);

    // 2. Sin redirect pendiente: si ya hay sesión activa, ir directo al portal.
    onAuthStateChanged(auth, (user) => {
      dlog('auth', `login.html observer: user=${!!user}`); // [DEBUG]
      if (user) {
        dlog('info', 'Redirigiendo a portal (sesión existente)'); // [DEBUG]
        navegarConFade('/portal.html');
      }
    });
  })();

  // 3. Botones: iniciar el redirect al proveedor (la página sale de la app).
  function wireProveedor(btn, nombre, loginFn) {
    btn.addEventListener('click', async () => {
      dlog('auth', `Click en botón ${nombre} → redirect`); // [DEBUG]
      errBox.classList.remove('visible');
      setBotones(true);
      btn.classList.add('loading');
      try {
        await loginFn();
      } catch (e) {
        dlog('error', `signInWithRedirect (${nombre}) falló: ${e.code}`, e.message); // [DEBUG]
        setBotones(false);
        btn.classList.remove('loading');
        mostrarError(e.code);
      }
    });
  }
  wireProveedor(btnGoogle, 'Google', loginWithGoogle);
  wireProveedor(btnMicrosoft, 'Microsoft', loginWithMicrosoft);
</script>
</body>
</html>
